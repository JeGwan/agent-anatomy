<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Anatomy - LLM Agent 통신의 해부학</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --surface3: #22222e;
  --border: #2a2a3a;
  --border-active: #4a4a6a;
  --text: #e0e0e8;
  --text-dim: #7878a0;
  --text-faint: #50506a;
  --accent: #818cf8;
  --accent-dim: rgba(129,140,248,0.15);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.12);
  --orange: #fbbf24;
  --orange-dim: rgba(251,191,36,0.12);
  --pink: #f472b6;
  --pink-dim: rgba(244,114,182,0.12);
  --cyan: #22d3ee;
  --cyan-dim: rgba(34,211,238,0.12);
  --red: #f87171;
  --red-dim: rgba(248,113,113,0.12);
  --blue: #60a5fa;
  --blue-dim: rgba(96,165,250,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',monospace;
  background: var(--bg); color: var(--text);
  line-height: 1.5;
}

/* ── Header ── */
.header {
  text-align:center; padding:2.5rem 2rem 1.5rem;
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size:2rem; font-weight:300; }
.header h1 b { color:var(--accent); font-weight:700; }
.header .sub { color:var(--text-dim); font-size:0.9rem; margin-top:0.4rem; }

/* ── Layout ── */
.layout {
  display:grid;
  grid-template-columns: 200px 1fr 1fr 200px;
  grid-template-rows: auto 1fr;
  max-width:1500px; margin:0 auto;
  min-height:calc(100vh - 120px);
}

/* ── Columns ── */
.col-user, .col-agent-out, .col-llm-in, .col-llm {
  border-right:1px solid var(--border);
  padding:0;
}
.col-llm { border-right:none; }
.col-header {
  padding:12px 16px;
  font-size:0.7rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--text-dim);
  border-bottom:1px solid var(--border);
  background:var(--surface);
  display:flex; align-items:center; gap:8px;
  position:sticky; top:0; z-index:10;
}
.col-header .dot {
  width:8px; height:8px; border-radius:50%;
}
.col-user .col-header .dot { background:var(--green); }
.col-agent-out .col-header .dot { background:var(--orange); }
.col-llm-in .col-header .dot { background:var(--accent); }
.col-llm .col-header .dot { background:var(--pink); }

.col-body { padding:12px; }

/* ── Message Bubbles ── */
.msg {
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  margin-bottom:10px;
  font-size:0.75rem;
  opacity:0; transform:translateY(8px);
  transition: opacity 0.4s, transform 0.4s, border-color 0.3s, box-shadow 0.3s;
  position:relative;
}
.msg.visible { opacity:1; transform:translateY(0); }
.msg.highlight { border-color:var(--accent); box-shadow:0 0 20px var(--accent-dim); }
.msg .tag {
  display:inline-block;
  padding:1px 7px;
  border-radius:4px;
  font-size:0.6rem;
  font-weight:700;
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:0.05em;
}
.tag-user { background:var(--green-dim); color:var(--green); }
.tag-system { background:var(--cyan-dim); color:var(--cyan); }
.tag-tools { background:var(--orange-dim); color:var(--orange); }
.tag-mcp { background:var(--pink-dim); color:var(--pink); }
.tag-skills { background:var(--accent-dim); color:var(--accent); }
.tag-history { background:var(--red-dim); color:var(--red); }
.tag-assistant { background:var(--blue-dim); color:var(--blue); }
.tag-tool-result { background:var(--orange-dim); color:var(--orange); }
.tag-thinking { background:rgba(200,200,255,0.08); color:var(--text-dim); }

.msg .content {
  color:var(--text);
  white-space:pre-wrap;
  word-break:break-word;
  line-height:1.6;
}
.msg .content.dim { color:var(--text-dim); }
.msg .content code {
  background:var(--surface3);
  padding:1px 4px;
  border-radius:3px;
  font-size:0.7rem;
}
.msg .json-key { color:var(--cyan); }
.msg .json-str { color:var(--green); }
.msg .json-bracket { color:var(--text-dim); }
.msg .json-comment { color:var(--text-faint); font-style:italic; }

/* Arrow between columns */
.arrow-indicator {
  position:absolute;
  right:-18px; top:50%; transform:translateY(-50%);
  color:var(--text-faint);
  font-size:1rem;
  z-index:5;
  opacity:0;
  transition: opacity 0.3s;
}
.arrow-indicator.visible { opacity:1; color:var(--accent); }

/* ── Controls ── */
.controls {
  grid-column: 1/-1;
  display:flex; align-items:center; gap:10px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  position:sticky; top:0; z-index:20;
}
.btn {
  padding:7px 18px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text);
  border-radius:6px;
  cursor:pointer;
  font-family:inherit;
  font-size:0.8rem;
  transition:all 0.2s;
}
.btn:hover { border-color:var(--accent); }
.btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn:disabled { opacity:0.3; cursor:default; }
.turn-info { color:var(--text-dim); font-size:0.8rem; }
.turn-info b { color:var(--accent); }
.spacer { flex:1; }
.speed-ctrl {
  display:flex; align-items:center; gap:6px;
  color:var(--text-faint); font-size:0.75rem;
}
.speed-ctrl input { width:70px; accent-color:var(--accent); }

/* ── Insight Bar ── */
.insight-bar {
  grid-column:1/-1;
  padding:10px 16px;
  background:var(--surface);
  border-top:1px solid var(--border);
  font-size:0.8rem;
  color:var(--text-dim);
  min-height:42px;
  position:sticky; bottom:0;
  display:flex; align-items:center; gap:10px;
}
.insight-bar .badge {
  background:var(--accent-dim);
  color:var(--accent);
  padding:2px 8px;
  border-radius:4px;
  font-size:0.7rem;
  font-weight:700;
  white-space:nowrap;
}
.insight-bar .insight-text { flex:1; }

/* ── Collapsed JSON ── */
.json-block {
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:6px;
  padding:10px 12px;
  margin-top:6px;
  font-size:0.68rem;
  overflow-x:auto;
  line-height:1.7;
  white-space:pre;
  tab-size:2;
}
.json-block .collapsed-hint {
  color:var(--text-faint);
  cursor:pointer;
  user-select:none;
}
.json-block .collapsed-hint:hover { color:var(--text-dim); }

/* ── Role label on messages ── */
.role-label {
  font-size:0.6rem;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:0.08em;
  margin-bottom:4px;
}

@media(max-width:1100px) {
  .layout { grid-template-columns:1fr 1fr; }
  .col-user, .col-llm { display:none; }
}
</style>
</head>
<body>

<div class="header">
  <h1>The <b>Anatomy</b> of an LLM Agent</h1>
  <p class="sub">User ↔ Agent ↔ LLM — 실제로 오가는 메시지를 해부한다</p>
</div>

<div class="layout">
  <!-- Controls Row -->
  <div class="controls">
    <button class="btn primary" id="btnPlay">&#9654; Play</button>
    <button class="btn" id="btnStep">Step &#9654;|</button>
    <button class="btn" id="btnReset">Reset</button>
    <span class="turn-info">Turn <b id="turnNum">0</b> / <b id="turnTotal">0</b></span>
    <span class="spacer"></span>
    <div class="speed-ctrl">
      <label>Speed</label>
      <input type="range" id="speedSlider" min="1" max="5" value="3">
    </div>
  </div>

  <!-- Column Headers -->
  <div class="col-user">
    <div class="col-header"><span class="dot"></span>User</div>
    <div class="col-body" id="colUser"></div>
  </div>
  <div class="col-agent-out">
    <div class="col-header"><span class="dot"></span>Agent Assembles</div>
    <div class="col-body" id="colAgent"></div>
  </div>
  <div class="col-llm-in">
    <div class="col-header"><span class="dot"></span>LLM Receives &amp; Responds</div>
    <div class="col-body" id="colLLM"></div>
  </div>
  <div class="col-llm">
    <div class="col-header"><span class="dot"></span>Execution</div>
    <div class="col-body" id="colExec"></div>
  </div>

  <!-- Insight Bar -->
  <div class="insight-bar">
    <span class="badge" id="insightBadge">INSIGHT</span>
    <span class="insight-text" id="insightText">Play를 눌러 Agent 루프를 시작하세요. 매 턴마다 실제 API 호출 구조를 볼 수 있습니다.</span>
  </div>
</div>

<script>
// ============================================================
// TURN DATA — shows actual message structure
// ============================================================
const TURNS = [
  // ── Turn 1: User sends first message ──
  {
    user: {
      tag: 'tag-user', label: 'USER INPUT',
      text: '"할일 API 만들어줘"'
    },
    agent: [
      {
        tag: 'tag-system', label: 'SYSTEM PROMPT',
        text: `role: "system"에 삽입`,
        json: `<span class="json-bracket">{</span>
  <span class="json-key">"role"</span>: <span class="json-str">"system"</span>,
  <span class="json-key">"content"</span>: <span class="json-str">"You are Claude Code, Anthropic's CLI...\\n\\n# Instructions\\n- Read files before editing\\n- Prefer Edit over sed\\n- Run tests after changes\\n- Never introduce security vulnerabilities\\n..."</span>
<span class="json-bracket">}</span>
<span class="json-comment">// 시스템 프롬프트: 페르소나, 규칙, 제약 조건</span>
<span class="json-comment">// 이것이 LLM의 "성격"과 "행동 원칙"을 결정한다</span>`
      },
      {
        tag: 'tag-tools', label: 'TOOLS DEFINITION',
        text: `tools[] 파라미터에 삽입`,
        json: `<span class="json-key">"tools"</span>: <span class="json-bracket">[</span>
  <span class="json-bracket">{</span>
    <span class="json-key">"name"</span>: <span class="json-str">"Bash"</span>,
    <span class="json-key">"description"</span>: <span class="json-str">"Execute bash command..."</span>,
    <span class="json-key">"input_schema"</span>: <span class="json-bracket">{</span> <span class="json-key">"command"</span>: <span class="json-str">"string"</span> <span class="json-bracket">}</span>
  <span class="json-bracket">}</span>,
  <span class="json-bracket">{</span> <span class="json-key">"name"</span>: <span class="json-str">"Read"</span>, ... <span class="json-bracket">}</span>,
  <span class="json-bracket">{</span> <span class="json-key">"name"</span>: <span class="json-str">"Write"</span>, ... <span class="json-bracket">}</span>,
  <span class="json-bracket">{</span> <span class="json-key">"name"</span>: <span class="json-str">"Edit"</span>, ... <span class="json-bracket">}</span>,
  <span class="json-bracket">{</span> <span class="json-key">"name"</span>: <span class="json-str">"Grep"</span>, ... <span class="json-bracket">}</span>,
  <span class="json-comment">// + MCP 서버가 제공하는 도구들</span>
  <span class="json-bracket">{</span> <span class="json-key">"name"</span>: <span class="json-str">"jira_search"</span>, ... <span class="json-bracket">}</span>,
  <span class="json-bracket">{</span> <span class="json-key">"name"</span>: <span class="json-str">"slack_post_message"</span>, ... <span class="json-bracket">}</span>
<span class="json-bracket">]</span>
<span class="json-comment">// LLM은 이 목록을 보고 "내가 뭘 할 수 있는지" 안다</span>
<span class="json-comment">// 도구가 없으면 텍스트만 출력할 수 있다</span>`
      },
      {
        tag: 'tag-skills', label: 'SKILLS → SYSTEM PROMPT에 주입',
        text: `스킬 목록이 시스템 프롬프트 끝에 추가됨`,
        json: `<span class="json-comment">// system prompt 끝에 append:</span>
<span class="json-str">"Available skills:\\n- /commit: Git commit workflow\\n- /review-pr: Review pull request\\n- /test: Run test suite\\n..."</span>
<span class="json-comment">// 스킬은 별도 프로토콜이 아니라</span>
<span class="json-comment">// 시스템 프롬프트에 텍스트로 주입될 뿐이다</span>`
      },
      {
        tag: 'tag-user', label: 'USER MESSAGE',
        text: `messages[]에 사용자 메시지 추가`,
        json: `<span class="json-key">"messages"</span>: <span class="json-bracket">[</span>
  <span class="json-bracket">{</span>
    <span class="json-key">"role"</span>: <span class="json-str">"user"</span>,
    <span class="json-key">"content"</span>: <span class="json-str">"할일 API 만들어줘"</span>
  <span class="json-bracket">}</span>
<span class="json-bracket">]</span>`
      }
    ],
    llm: {
      tag: 'tag-assistant', label: 'LLM RESPONSE',
      text: 'LLM이 tool_use 블록을 반환',
      json: `<span class="json-bracket">{</span>
  <span class="json-key">"role"</span>: <span class="json-str">"assistant"</span>,
  <span class="json-key">"content"</span>: <span class="json-bracket">[</span>
    <span class="json-bracket">{</span>
      <span class="json-key">"type"</span>: <span class="json-str">"text"</span>,
      <span class="json-key">"text"</span>: <span class="json-str">"프로젝트 구조를 먼저 확인하겠습니다."</span>
    <span class="json-bracket">}</span>,
    <span class="json-bracket">{</span>
      <span class="json-key">"type"</span>: <span class="json-str">"tool_use"</span>,
      <span class="json-key">"id"</span>: <span class="json-str">"toolu_01abc"</span>,
      <span class="json-key">"name"</span>: <span class="json-str">"Bash"</span>,
      <span class="json-key">"input"</span>: <span class="json-bracket">{</span> <span class="json-key">"command"</span>: <span class="json-str">"ls -la"</span> <span class="json-bracket">}</span>
    <span class="json-bracket">}</span>
  <span class="json-bracket">]</span>
<span class="json-bracket">}</span>
<span class="json-comment">// LLM은 텍스트와 tool_use를 동시에 반환할 수 있다</span>
<span class="json-comment">// tool_use의 name은 반드시 tools[]에 정의된 이름이어야 한다</span>`
    },
    exec: {
      label: 'AGENT EXECUTES',
      text: `Agent가 Bash("ls -la") 실행\n→ 실제 터미널 명령 수행\n→ 결과를 수집`
    },
    insight: 'Turn 1의 API 호출 구조: system(페르소나+규칙+스킬) + tools[](사용 가능한 도구) + messages[](유저 메시지). 이 세 가지가 LLM이 받는 전부다.',
  },
  // ── Turn 2: Tool result → next LLM call ──
  {
    user: null,
    agent: [
      {
        tag: 'tag-history', label: 'MESSAGES[] 누적',
        text: `이전 턴의 assistant 응답 + tool 결과가 history에 추가됨`,
        json: `<span class="json-key">"messages"</span>: <span class="json-bracket">[</span>
  <span class="json-comment">// Turn 1의 user message (유지)</span>
  <span class="json-bracket">{</span> <span class="json-key">"role"</span>: <span class="json-str">"user"</span>, <span class="json-key">"content"</span>: <span class="json-str">"할일 API 만들어줘"</span> <span class="json-bracket">}</span>,

  <span class="json-comment">// Turn 1의 LLM 응답 (유지)</span>
  <span class="json-bracket">{</span> <span class="json-key">"role"</span>: <span class="json-str">"assistant"</span>, <span class="json-key">"content"</span>: <span class="json-bracket">[</span>
    <span class="json-bracket">{</span> <span class="json-key">"type"</span>: <span class="json-str">"text"</span>, <span class="json-key">"text"</span>: <span class="json-str">"프로젝트 구조를..."</span> <span class="json-bracket">}</span>,
    <span class="json-bracket">{</span> <span class="json-key">"type"</span>: <span class="json-str">"tool_use"</span>, <span class="json-key">"id"</span>: <span class="json-str">"toolu_01abc"</span>, ... <span class="json-bracket">}</span>
  <span class="json-bracket">]</span> <span class="json-bracket">}</span>,

  <span class="json-comment">// ★ NEW: Agent가 추가한 tool 실행 결과</span>
  <span class="json-bracket">{</span>
    <span class="json-key">"role"</span>: <span class="json-str">"user"</span>,
    <span class="json-key">"content"</span>: <span class="json-bracket">[{</span>
      <span class="json-key">"type"</span>: <span class="json-str">"tool_result"</span>,
      <span class="json-key">"tool_use_id"</span>: <span class="json-str">"toolu_01abc"</span>,
      <span class="json-key">"content"</span>: <span class="json-str">"package.json\\nnode_modules/\\nsrc/\\n  app.js\\n  routes/\\ntests/"</span>
    <span class="json-bracket">}]</span>
  <span class="json-bracket">}</span>
<span class="json-bracket">]</span>
<span class="json-comment">// tool_result는 "user" role로 들어간다!</span>
<span class="json-comment">// LLM 입장에서는 "사용자가 결과를 알려준 것"</span>`
      }
    ],
    llm: {
      tag: 'tag-assistant', label: 'LLM RESPONSE',
      text: 'LLM이 ls 결과를 보고 다음 행동 결정',
      json: `<span class="json-bracket">{</span>
  <span class="json-key">"role"</span>: <span class="json-str">"assistant"</span>,
  <span class="json-key">"content"</span>: <span class="json-bracket">[</span>
    <span class="json-bracket">{</span>
      <span class="json-key">"type"</span>: <span class="json-str">"text"</span>,
      <span class="json-key">"text"</span>: <span class="json-str">"Node.js 프로젝트네요. Express 라우터를 만들겠습니다."</span>
    <span class="json-bracket">}</span>,
    <span class="json-bracket">{</span>
      <span class="json-key">"type"</span>: <span class="json-str">"tool_use"</span>,
      <span class="json-key">"name"</span>: <span class="json-str">"Write"</span>,
      <span class="json-key">"input"</span>: <span class="json-bracket">{</span>
        <span class="json-key">"file_path"</span>: <span class="json-str">"src/routes/todos.js"</span>,
        <span class="json-key">"content"</span>: <span class="json-str">"const express = require('express')..."</span>
      <span class="json-bracket">}</span>
    <span class="json-bracket">}</span>
  <span class="json-bracket">]</span>
<span class="json-bracket">}</span>
<span class="json-comment">// ls 결과에서 "src/routes/" 존재를 확인하고</span>
<span class="json-comment">// 거기에 파일을 만들기로 "판단"한 것</span>`
    },
    exec: {
      label: 'AGENT EXECUTES',
      text: `Agent가 Write 도구 실행\n→ src/routes/todos.js 파일 생성\n→ 결과를 다음 messages[]에 추가`
    },
    insight: 'tool_result는 "user" role로 들어간다. LLM에게는 user/assistant/user/assistant... 교대 구조만 있을 뿐, "도구 실행"이라는 개념은 없다. Agent가 중간에서 도구를 실행하고 결과를 user role로 끼워넣는 것.',
  },
  // ── Turn 3: Multiple tool calls ──
  {
    user: null,
    agent: [
      {
        tag: 'tag-history', label: 'MESSAGES[] 계속 누적',
        text: `messages가 점점 길어진다`,
        json: `<span class="json-key">"messages"</span>: <span class="json-bracket">[</span>
  <span class="json-comment">// Turn 1: user("할일 API 만들어줘")</span>
  <span class="json-comment">// Turn 1: assistant(text + tool_use:Bash)</span>
  <span class="json-comment">// Turn 1: user(tool_result: ls output)</span>
  <span class="json-comment">// Turn 2: assistant(text + tool_use:Write)</span>
  <span class="json-comment">// Turn 2: user(tool_result: file created)</span>

  <span class="json-comment">// ↑ 이 모든 것이 매 턴마다 함께 전송된다</span>
  <span class="json-comment">// LLM은 stateless — 매번 처음부터 다 읽는다</span>
<span class="json-bracket">]</span>
<span class="json-comment">// context window = 이 messages[]의 크기 제한</span>
<span class="json-comment">// 대화가 길어지면 오래된 메시지를 요약/삭제한다</span>`
      }
    ],
    llm: {
      tag: 'tag-assistant', label: 'LLM: PARALLEL TOOL CALLS',
      text: 'LLM이 여러 도구를 한번에 호출할 수 있다',
      json: `<span class="json-bracket">{</span>

let currentTurn = 0;
let isPlaying = false;
const $ = id => document.getElementById(id);

$('turnTotal').textContent = TURNS.length;

function getDelay() {
  const v = parseInt($('speedSlider').value);
  return [4000, 3000, 2000, 1200, 600][v - 1];
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function dedent(html) {
  // Remove common leading whitespace from each line (ignoring blank lines)
  const lines = html.split('\n');
  const nonEmpty = lines.filter(l => l.trim().length > 0);
  if (nonEmpty.length === 0) return html;
  const minIndent = Math.min(...nonEmpty.map(l => l.match(/^(\s*)/)[1].length));
  return lines.map(l => l.slice(minIndent)).join('\n').trim();
}

function createMsg(parent, { tag, label, text, json }) {
  const el = document.createElement('div');
  el.className = 'msg';
  let html = `<span class="tag ${tag}">${label}</span>`;
  html += `<div class="content">${text}</div>`;
  if (json) html += `<div class="json-block">${dedent(json)}</div>`;
  el.innerHTML = html;
  parent.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
  return el;
}

function createExec(parent, { label, text }) {
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = `<div class="role-label">${label}</div><div class="content dim">${text}</div>`;
  parent.appendChild(el);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
  return el;
}

// Remove highlight from all messages
function clearHighlights() {
  document.querySelectorAll('.msg.highlight').forEach(m => m.classList.remove('highlight'));
}

async function runTurn(idx) {
  const turn = TURNS[idx];
  const delay = getDelay();
  const step = delay * 0.2;

  clearHighlights();

  // Divider
  for (const col of ['colUser','colAgent','colLLM','colExec']) {
    const div = document.createElement('div');
    div.style.cssText = `text-align:center;color:var(--text-faint);font-size:0.65rem;padding:6px 0;margin:4px 0;border-top:1px dashed var(--border);`;
    div.textContent = `── Turn ${idx + 1} ──`;
    $(col).appendChild(div);
  }

  // 1. User column
  if (turn.user) {
    const m = createMsg($('colUser'), turn.user);
    m.classList.add('highlight');
    await sleep(step);
  }

  // 2. Agent assembles
  for (const block of turn.agent) {
    const m = createMsg($('colAgent'), block);
    m.classList.add('highlight');
    await sleep(step);
  }

  // 3. LLM responds
  const llmMsg = createMsg($('colLLM'), turn.llm);
  llmMsg.classList.add('highlight');
  await sleep(step);

  // 4. Execution
  if (turn.exec) {
    createExec($('colExec'), turn.exec);
  }

  // Update insight
  if (turn.insight) {
    $('insightText').textContent = turn.insight;
  }

  $('turnNum').textContent = idx + 1;

  // Scroll columns to bottom
  for (const col of ['colUser','colAgent','colLLM','colExec']) {
    const el = $(col);
    el.scrollTop = el.scrollHeight;
  }

  await sleep(step);
}

async function playAll() {
  if (isPlaying) { pause(); return; }
  isPlaying = true;
  $('btnPlay').innerHTML = '&#10074;&#10074; Pause';
  $('btnStep').disabled = true;

  while (isPlaying && currentTurn < TURNS.length) {
    await runTurn(currentTurn);
    currentTurn++;
    if (isPlaying && currentTurn < TURNS.length) await sleep(getDelay() * 0.5);
  }
  if (currentTurn >= TURNS.length) onComplete();
}

function pause() {
  isPlaying = false;
  $('btnPlay').innerHTML = '&#9654; Play';
  $('btnStep').disabled = false;
}

async function step() {
  if (currentTurn >= TURNS.length) return;
  $('btnStep').disabled = true;
  await runTurn(currentTurn);
  currentTurn++;
  $('btnStep').disabled = false;
  if (currentTurn >= TURNS.length) onComplete();
}

function reset() {
  pause();
  currentTurn = 0;
  $('turnNum').textContent = 0;
  for (const col of ['colUser','colAgent','colLLM','colExec']) $(col).innerHTML = '';
  $('insightText').textContent = 'Play를 눌러 Agent 루프를 시작하세요.';
  $('btnPlay').disabled = false;
  $('btnStep').disabled = false;
}

function onComplete() {
  pause();
  $('btnPlay').disabled = true;
  $('insightBadge').textContent = 'CONCLUSION';
  $('insightText').innerHTML = `<b>Agent의 전부:</b> system prompt + tools[] + messages[]. 이 세 가지를 매 턴마다 조립해서 LLM API에 보내고, 응답에서 tool_use를 파싱해서 실행하고, 결과를 messages[]에 추가하는 루프. MCP는 tools[]를 외부에서 가져오는 프로토콜, Skills는 잘 쓰인 프롬프트 템플릿, History는 messages[]의 누적. <b>Agent Engineering = Context Engineering.</b>`;
}

$('btnPlay').addEventListener('click', playAll);
$('btnStep').addEventListener('click', step);
$('btnReset').addEventListener('click', reset);
</script>
</body>
</html>
