<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Anatomy — LLM Agent 통신의 해부학</title>
<style>
:root {
  --bg: #08080d;
  --surface: #0f0f16;
  --surface2: #16161f;
  --surface3: #1e1e2a;
  --border: #252535;
  --text: #d8d8e8;
  --dim: #6e6e8e;
  --faint: #3e3e55;
  --accent: #818cf8;
  --accent-bg: rgba(129,140,248,0.08);
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.08);
  --orange: #fbbf24;
  --orange-bg: rgba(251,191,36,0.08);
  --pink: #f472b6;
  --pink-bg: rgba(244,114,182,0.08);
  --cyan: #22d3ee;
  --cyan-bg: rgba(34,211,238,0.08);
  --red: #f87171;
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono','Fira Code','JetBrains Mono',monospace;background:var(--bg);color:var(--text);overflow-x:hidden}

/* Header */
.header{text-align:center;padding:2rem 1rem 1.2rem;border-bottom:1px solid var(--border)}
.header h1{font-size:1.8rem;font-weight:300}
.header h1 b{color:var(--accent);font-weight:700}
.header p{color:var(--dim);font-size:0.85rem;margin-top:0.3rem}

/* Controls */
.controls{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;border-bottom:1px solid var(--border);
  background:var(--surface);position:sticky;top:0;z-index:100;
}
.btn{padding:7px 16px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:6px;cursor:pointer;font-family:inherit;font-size:0.8rem;transition:all 0.2s}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn:disabled{opacity:0.3;cursor:default}
.turn-info{color:var(--dim);font-size:0.8rem}
.turn-info b{color:var(--accent)}
.spacer{flex:1}
.speed-ctrl{display:flex;align-items:center;gap:6px;color:var(--faint);font-size:0.75rem}
.speed-ctrl input{width:60px;accent-color:var(--accent)}

/* Sequence Diagram */
.sequence{
  max-width:1100px;margin:0 auto;padding:0 20px 60px;
  position:relative;
}

/* Three Lanes */
.lane-headers{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  position:sticky;top:45px;z-index:90;
  background:var(--bg);padding:16px 0 12px;
  border-bottom:1px solid var(--border);
}
.lane-header{
  text-align:center;
}
.lane-node{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 20px;border-radius:24px;
  font-size:0.8rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.08em;
}
.lane-node.user-node{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,0.3)}
.lane-node.agent-node{background:var(--orange-bg);color:var(--orange);border:1px solid rgba(251,191,36,0.3)}
.lane-node.llm-node{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(129,140,248,0.3)}
.lane-node .node-dot{width:8px;height:8px;border-radius:50%}
.user-node .node-dot{background:var(--green)}
.agent-node .node-dot{background:var(--orange)}
.llm-node .node-dot{background:var(--accent)}

/* Lifelines */
.lane-lines{
  position:absolute;top:100px;left:0;right:0;bottom:0;
  display:grid;grid-template-columns:1fr 1fr 1fr;
  pointer-events:none;z-index:0;
}
.lifeline{
  border-left:1px dashed var(--border);
  margin-left:50%;
}

/* Steps container */
.steps{position:relative;z-index:1;padding-top:16px}

/* Step */
.step{
  opacity:0;transform:translateY(12px);
  transition:opacity 0.5s,transform 0.5s;
  margin-bottom:6px;
}
.step.visible{opacity:1;transform:translateY(0)}

/* Arrow Row */
.arrow-row{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  align-items:center;
  min-height:36px;
  position:relative;
}

/* Arrow */
.arrow{
  position:relative;
  display:flex;align-items:center;
  padding:4px 0;
}
.arrow-line{
  flex:1;height:2px;
  background:var(--arrow-color);
}
.arrow-head{
  width:0;height:0;
  border-top:6px solid transparent;
  border-bottom:6px solid transparent;
  flex-shrink:0;
}
/* Right arrow */
.arrow.right .arrow-head{border-left:10px solid var(--arrow-color)}
/* Left arrow */
.arrow.left .arrow-head{border-right:10px solid var(--arrow-color)}
.arrow.left{flex-direction:row-reverse}

.arrow-label{
  position:absolute;top:-14px;
  font-size:0.6rem;font-weight:600;
  text-transform:uppercase;letter-spacing:0.06em;
  white-space:nowrap;
  color:var(--dim);
}
.arrow.right .arrow-label{left:8px}
.arrow.left .arrow-label{right:8px}

/* Spans for arrow placement */
.span-1-2{grid-column:1/3;padding:0 16.7%}  /* user center → agent center */
.span-2-3{grid-column:2/4;padding:0 16.7%}  /* agent center → llm center */
.span-3-2{grid-column:2/4;padding:0 16.7%}  /* llm center → agent center */
.span-2-1{grid-column:1/3;padding:0 16.7%}  /* agent center → user center */

/* Message Card — attached below arrows */
.msg-row{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  margin-bottom:8px;
}
.msg-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 12px;
  font-size:0.72rem;
  line-height:1.6;
  max-width:100%;
  overflow:hidden;
}
.msg-card.at-user{grid-column:1}
.msg-card.at-agent{grid-column:2}
.msg-card.at-llm{grid-column:3}
.msg-card.span-agent-llm{grid-column:2/4}

.msg-card .card-tag{
  display:inline-block;padding:1px 6px;border-radius:3px;
  font-size:0.58rem;font-weight:700;text-transform:uppercase;
  letter-spacing:0.05em;margin-bottom:5px;margin-right:4px;
}
.t-green{background:var(--green-bg);color:var(--green)}
.t-cyan{background:var(--cyan-bg);color:var(--cyan)}
.t-orange{background:var(--orange-bg);color:var(--orange)}
.t-pink{background:var(--pink-bg);color:var(--pink)}
.t-accent{background:var(--accent-bg);color:var(--accent)}
.t-blue{background:var(--blue-bg);color:var(--blue)}
.t-red{background:rgba(248,113,113,0.1);color:var(--red)}

.msg-card .card-text{color:var(--text);white-space:pre-wrap;word-break:break-word}
.msg-card .card-dim{color:var(--dim)}

/* JSON in cards */
.json{
  background:var(--bg);border:1px solid var(--border);
  border-radius:5px;padding:8px 10px;margin-top:6px;
  font-size:0.65rem;line-height:1.7;
  white-space:pre-wrap;word-break:break-word;
  overflow:hidden;
}
.jk{color:var(--cyan)}
.js{color:var(--green)}
.jb{color:var(--dim)}
.jc{color:var(--faint);font-style:italic}

/* Turn divider */
.turn-divider{
  text-align:center;padding:16px 0 10px;
  color:var(--faint);font-size:0.65rem;
  letter-spacing:0.1em;
}
.turn-divider span{
  padding:3px 14px;border:1px dashed var(--border);border-radius:12px;
}

/* Insight bar */
.insight-bar{
  position:sticky;bottom:0;z-index:90;
  background:var(--surface);border-top:1px solid var(--border);
  padding:10px 20px;font-size:0.78rem;
  display:flex;align-items:center;gap:10px;
}
.insight-bar .badge{
  background:var(--accent-bg);color:var(--accent);
  padding:2px 8px;border-radius:4px;
  font-size:0.65rem;font-weight:700;white-space:nowrap;
}

/* Highlight pulse */
@keyframes card-pop{
  0%{box-shadow:0 0 0 0 rgba(129,140,248,0.3)}
  70%{box-shadow:0 0 0 8px rgba(129,140,248,0)}
  100%{box-shadow:0 0 0 0 rgba(129,140,248,0)}
}
.msg-card.pop{animation:card-pop 0.6s ease-out}

@keyframes arrow-draw{
  from{transform:scaleX(0)}
  to{transform:scaleX(1)}
}
.arrow.right.animate .arrow-line{animation:arrow-draw 0.3s ease-out forwards;transform-origin:left center}
.arrow.left.animate .arrow-line{animation:arrow-draw 0.3s ease-out forwards;transform-origin:right center}

@media(max-width:800px){
  .lane-headers,.arrow-row,.msg-row,.lane-lines{display:block!important}
  .lane-header{display:inline-block;margin:0 4px}
  .span-1-2,.span-2-3,.span-3-2,.span-2-1{padding:0 20px}
  .msg-card{grid-column:auto!important;margin:4px 0}
  .lifeline{display:none}
}
</style>
</head>
<body>

<div class="header">
  <h1>The <b>Anatomy</b> of an LLM Agent</h1>
  <p>User ↔ Agent ↔ LLM — request/response 사이클을 해부한다</p>
</div>

<div class="controls">
  <button class="btn primary" id="btnPlay">&#9654; Play</button>
  <button class="btn" id="btnStep">Step</button>
  <button class="btn" id="btnReset">Reset</button>
  <span class="turn-info">Step <b id="stepNum">0</b> / <b id="stepTotal">0</b></span>
  <span class="spacer"></span>
  <div class="speed-ctrl">
    <label>Speed</label>
    <input type="range" id="speedSlider" min="1" max="5" value="3">
  </div>
</div>

<div class="sequence">
  <!-- Lane Headers -->
  <div class="lane-headers">
    <div class="lane-header"><span class="lane-node user-node"><span class="node-dot"></span>User</span></div>
    <div class="lane-header"><span class="lane-node agent-node"><span class="node-dot"></span>Agent</span></div>
    <div class="lane-header"><span class="lane-node llm-node"><span class="node-dot"></span>LLM</span></div>
  </div>
  <!-- Lifelines -->
  <div class="lane-lines"><div class="lifeline"></div><div class="lifeline"></div><div class="lifeline"></div></div>
  <!-- Steps go here -->
  <div class="steps" id="steps"></div>
</div>

<div class="insight-bar">
  <span class="badge" id="insightBadge">INSIGHT</span>
  <span id="insightText">Play를 눌러 시작하세요. User ↔ Agent ↔ LLM 사이 메시지가 어떻게 오가는지 볼 수 있습니다.</span>
</div>

<script>
// ============================================================
// STEP DATA
// Each step: arrows + cards showing what's happening
// ============================================================
const STEPS = [
// ── TURN 1 ──
{ turn: 1, label: '사용자가 요청을 입력한다' },
{
  arrows: [{ from:1, to:2, color:'var(--green)', label:'user message' }],
  cards: [{
    col:'at-user', tags:[{t:'t-green',l:'입력'}],
    text:'"할일 API 만들어줘"',
  }],
  insight:'사용자의 텍스트가 Agent에게 전달된다. 아직 LLM은 관여하지 않는다.'
},
{
  arrows: [{ from:2, to:3, color:'var(--orange)', label:'API request' }],
  cards: [{
    col:'span-agent-llm', tags:[{t:'t-cyan',l:'system'},{t:'t-orange',l:'tools'},{t:'t-accent',l:'skills'},{t:'t-green',l:'user msg'}],
    text:'Agent가 모든 컨텍스트를 조립해서 LLM API에 전송:',
    json:`<span class="jb">{</span>
  <span class="jk">"system"</span>: <span class="js">"You are Claude Code...\\n규칙, 제약, 페르소나"</span>,
  <span class="jk">"tools"</span>: <span class="jb">[</span>
    <span class="jb">{</span> <span class="jk">"name"</span>: <span class="js">"Bash"</span>, <span class="jk">"description"</span>: <span class="js">"..."</span> <span class="jb">}</span>,
    <span class="jb">{</span> <span class="jk">"name"</span>: <span class="js">"Read"</span>, ... <span class="jb">}</span>,
    <span class="jb">{</span> <span class="jk">"name"</span>: <span class="js">"Write"</span>, ... <span class="jb">}</span>,
    <span class="jb">{</span> <span class="jk">"name"</span>: <span class="js">"Edit"</span>, ... <span class="jb">}</span>,
    <span class="jb">{</span> <span class="jk">"name"</span>: <span class="js">"mcp__jira__search"</span>, ... <span class="jb">}</span>  <span class="jc">← MCP 도구도 여기 섞임</span>
  <span class="jb">]</span>,
  <span class="jk">"messages"</span>: <span class="jb">[</span>
    <span class="jb">{</span> <span class="jk">"role"</span>: <span class="js">"user"</span>, <span class="jk">"content"</span>: <span class="js">"할일 API 만들어줘"</span> <span class="jb">}</span>
  <span class="jb">]</span>
<span class="jb">}</span>
<span class="jc">// system: 페르소나 + 규칙 + 스킬 목록 (텍스트로 주입)</span>
<span class="jc">// tools: LLM이 호출할 수 있는 도구 정의</span>
<span class="jc">// messages: 대화 히스토리 (첫 턴이라 1개)</span>`
  }],
  insight:'Agent의 핵심 역할: system + tools[] + messages[]를 조립해서 LLM API에 보내는 것. 스킬은 system에 텍스트로, MCP 도구는 tools[]에 섞여 들어간다. LLM은 이 구분을 모른다.'
},
{
  arrows: [{ from:3, to:2, color:'var(--accent)', label:'response (tool_use)' }],
  cards: [{
    col:'at-llm', tags:[{t:'t-accent',l:'LLM 판단'}],
    text:'LLM이 "프로젝트 구조부터 확인하자"고 결정:',
    json:`<span class="jb">{</span>
  <span class="jk">"role"</span>: <span class="js">"assistant"</span>,
  <span class="jk">"content"</span>: <span class="jb">[</span>
    <span class="jb">{</span> <span class="jk">"type"</span>: <span class="js">"text"</span>,
      <span class="jk">"text"</span>: <span class="js">"프로젝트 구조를 확인합니다."</span> <span class="jb">}</span>,
    <span class="jb">{</span> <span class="jk">"type"</span>: <span class="js">"tool_use"</span>,
      <span class="jk">"id"</span>: <span class="js">"toolu_01a"</span>,
      <span class="jk">"name"</span>: <span class="js">"Bash"</span>,
      <span class="jk">"input"</span>: <span class="jb">{</span> <span class="jk">"command"</span>: <span class="js">"ls -la"</span> <span class="jb">}</span> <span class="jb">}</span>
  <span class="jb">]</span>
<span class="jb">}</span>
<span class="jc">// tool_use = "이 도구를 이 인자로 실행해줘"</span>
<span class="jc">// LLM은 JSON을 출력할 뿐, 실행은 못 한다</span>`
  }],
  insight:'LLM은 tools[]를 보고 "Bash를 쓸 수 있구나"를 안다. tool_use는 "실행 요청"이지 실행이 아니다. LLM은 JSON을 출력하는 것이 전부.'
},
{
  arrows: [],
  cards: [{
    col:'at-agent', tags:[{t:'t-orange',l:'실행'}],
    text:'Agent가 tool_use를 파싱하고 실제 실행:\n\n$ ls -la\npackage.json\nnode_modules/\nsrc/\n  app.js\n  routes/\ntests/',
  }],
  insight:'Agent의 두 번째 역할: LLM 응답에서 tool_use를 감지하면 실제로 실행하고, 결과를 수집한다.'
},
// ── TURN 2 ──
{ turn: 2, label: 'Agent가 결과를 LLM에게 돌려보낸다' },
{
  arrows: [{ from:2, to:3, color:'var(--orange)', label:'tool_result 포함 재요청' }],
  cards: [{
    col:'span-agent-llm', tags:[{t:'t-orange',l:'tool_result'},{t:'t-red',l:'history 누적'}],
    text:'Agent가 실행 결과를 messages[]에 추가하고 다시 LLM 호출:',
    json:`<span class="jk">"messages"</span>: <span class="jb">[</span>
  <span class="jc">// 1. 원래 유저 메시지</span>
  <span class="jb">{</span> <span class="jk">"role"</span>: <span class="js">"user"</span>,
    <span class="jk">"content"</span>: <span class="js">"할일 API 만들어줘"</span> <span class="jb">}</span>,

  <span class="jc">// 2. 이전 LLM 응답 (그대로 보존)</span>
  <span class="jb">{</span> <span class="jk">"role"</span>: <span class="js">"assistant"</span>,
    <span class="jk">"content"</span>: <span class="jb">[</span>..text, ..tool_use<span class="jb">]</span> <span class="jb">}</span>,

  <span class="jc">// 3. ★ 도구 실행 결과 (user role로!)</span>
  <span class="jb">{</span> <span class="jk">"role"</span>: <span class="js">"user"</span>,
    <span class="jk">"content"</span>: <span class="jb">[{</span>
      <span class="jk">"type"</span>: <span class="js">"tool_result"</span>,
      <span class="jk">"tool_use_id"</span>: <span class="js">"toolu_01a"</span>,
      <span class="jk">"content"</span>: <span class="js">"package.json\\nsrc/\\n  app.js..."</span>
    <span class="jb">}]</span> <span class="jb">}</span>
<span class="jb">]</span>
<span class="jc">// tool_result가 "user" role인 이유:</span>
<span class="jc">// LLM API에는 user/assistant만 있다.</span>
<span class="jc">// Agent가 결과를 "유저가 알려준 것"처럼 넣는다.</span>`
  }],
  insight:'핵심 구조: tool_result는 "user" role로 들어간다! LLM API에 "도구 결과"라는 role은 없다. Agent가 실행 결과를 user 메시지로 끼워넣는 것. LLM은 매번 전체 messages[]를 처음부터 읽는다 (stateless).'
},
{
  arrows: [{ from:3, to:2, color:'var(--accent)', label:'response (tool_use)' }],
  cards: [{
    col:'at-llm', tags:[{t:'t-accent',l:'판단'}],
    text:'ls 결과를 보고 Express 라우터 생성을 결정:',
    json:`<span class="jb">{</span>
  <span class="jk">"content"</span>: <span class="jb">[</span>
    <span class="jb">{</span> <span class="jk">"type"</span>: <span class="js">"tool_use"</span>,
      <span class="jk">"name"</span>: <span class="js">"Write"</span>,
      <span class="jk">"input"</span>: <span class="jb">{</span>
        <span class="jk">"file_path"</span>: <span class="js">"src/routes/todos.js"</span>,
        <span class="jk">"content"</span>: <span class="js">"const router = require..."</span>
      <span class="jb">}</span> <span class="jb">}</span>
  <span class="jb">]</span>
<span class="jb">}</span>`
  }],
  insight:'LLM은 "src/routes/ 디렉토리가 있다"를 history에서 확인하고 거기에 파일을 만들기로 했다. 이전 턴의 결과가 다음 판단의 근거.'
},
{
  arrows: [],
  cards: [{
    col:'at-agent', tags:[{t:'t-orange',l:'실행'}],
    text:'Agent가 Write 도구 실행:\n→ src/routes/todos.js 파일 생성 완료',
  }],
  insight:null
},
// ── TURN 3 ──
{ turn: 3, label: '테스트 실행 → 실패 → 자가 수정' },
{
  arrows: [{ from:2, to:3, color:'var(--orange)', label:'result + 재요청' }],
  cards: [{
    col:'at-agent', tags:[{t:'t-orange',l:'context 조립'}],
    text:'messages[]가 점점 길어진다:\n\n[user] "할일 API 만들어줘"\n[assistant] tool_use: Bash(ls)\n[user] tool_result: 디렉토리 목록\n[assistant] tool_use: Write(todos.js)\n[user] tool_result: 파일 생성 완료\n← 매번 이 전부를 LLM에게 보낸다',
  }],
  insight:'LLM은 stateless — 매 호출마다 전체 대화를 처음부터 다시 읽는다. "기억"이란 없고, messages[]에 있는 것이 전부다. 대화가 길어지면 context window를 넘기므로 Agent가 오래된 메시지를 요약/삭제한다.'
},
{
  arrows: [{ from:3, to:2, color:'var(--accent)', label:'tool_use: Bash' }],
  cards: [{
    col:'at-llm', tags:[{t:'t-accent',l:'판단'}],
    text:'코드를 작성했으니 테스트 실행:',
    json:`<span class="jb">{</span> <span class="jk">"name"</span>: <span class="js">"Bash"</span>,
  <span class="jk">"input"</span>: <span class="jb">{</span> <span class="jk">"command"</span>: <span class="js">"npm test"</span> <span class="jb">}</span> <span class="jb">}</span>
<span class="jc">// system prompt: "코드 작성 후 반드시 테스트"</span>
<span class="jc">// 이 지침이 없으면 테스트 안 했을 수도!</span>`
  }],
  insight:'System Prompt의 "테스트를 돌려라" 지침이 이 행동을 만들었다. 시스템 프롬프트 = LLM의 습관과 원칙.'
},

// ENGINE
// ============================================================
let cur = 0, playing = false;
const $=id=>document.getElementById(id);
const stepsEl = $('steps');
$('stepTotal').textContent = STEPS.filter(s=>!s.turn).length;

function delay(){return [3500,2500,1800,1000,500][parseInt($('speedSlider').value)-1]}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

function dedent(h){
  const lines=h.split('\n');
  const ne=lines.filter(l=>l.trim());
  if(!ne.length)return h;
  const min=Math.min(...ne.map(l=>l.match(/^(\s*)/)[1].length));
  return lines.map(l=>l.slice(min)).join('\n').trim();
}

async function renderStep(idx) {
  const s = STEPS[idx];

  // Turn divider
  if (s.turn) {
    const d = document.createElement('div');
    d.className = 'turn-divider step';
    d.innerHTML = `<span>TURN ${s.turn} — ${s.label}</span>`;
    stepsEl.appendChild(d);
    requestAnimationFrame(()=>requestAnimationFrame(()=>d.classList.add('visible')));
    return;
  }

  const stepEl = document.createElement('div');
  stepEl.className = 'step';
  let html = '';

  // Arrows
  if (s.arrows && s.arrows.length) {
    html += '<div class="arrow-row">';
    for (const a of s.arrows) {
      const spanCls = a.from<a.to
        ? (a.from===1&&a.to===2?'span-1-2':'span-2-3')
        : (a.from===3&&a.to===2?'span-3-2':'span-2-1');
      const dir = a.from<a.to?'right':'left';
      html += `<div class="arrow ${dir} animate ${spanCls}" style="--arrow-color:${a.color}">
        <span class="arrow-label">${a.label}</span>
        <div class="arrow-line"></div><div class="arrow-head"></div>
      </div>`;
    }
    html += '</div>';
  }

  // Cards
  if (s.cards && s.cards.length) {
    html += '<div class="msg-row">';
    for (const c of s.cards) {
      const tags = (c.tags||[]).map(t=>`<span class="card-tag ${t.t}">${t.l}</span>`).join('');
      const jsonHtml = c.json ? `<div class="json">${dedent(c.json)}</div>` : '';
      html += `<div class="msg-card pop ${c.col}">${tags}<div class="card-text">${c.text}</div>${jsonHtml}</div>`;
    }
    html += '</div>';
  }

  stepEl.innerHTML = html;
  stepsEl.appendChild(stepEl);
  requestAnimationFrame(()=>requestAnimationFrame(()=>stepEl.classList.add('visible')));

  // Update counter & insight
  const dataSteps = STEPS.slice(0,idx+1).filter(x=>!x.turn).length;
  $('stepNum').textContent = dataSteps;
  if (s.insight) $('insightText').textContent = s.insight;

  // Scroll
  stepEl.scrollIntoView({behavior:'smooth',block:'nearest'});

  await sleep(delay());
}

async function playAll() {
  if(playing){pause();return}
  playing=true;
  $('btnPlay').innerHTML='&#10074;&#10074; Pause';
  $('btnStep').disabled=true;
  while(playing && cur<STEPS.length){
    await renderStep(cur); cur++;
  }
  if(cur>=STEPS.length) onDone();
}
function pause(){playing=false;$('btnPlay').innerHTML='&#9654; Play';$('btnStep').disabled=false}
async function step(){
  if(cur>=STEPS.length)return;
  $('btnStep').disabled=true;
  await renderStep(cur);cur++;
  $('btnStep').disabled=false;
  if(cur>=STEPS.length) onDone();
}
function reset(){
  pause();cur=0;stepsEl.innerHTML='';
  $('stepNum').textContent=0;
  $('insightText').textContent='Play를 눌러 시작하세요.';
  $('insightBadge').textContent='INSIGHT';
  $('btnPlay').disabled=false;$('btnStep').disabled=false;
}
function onDone(){
  pause();$('btnPlay').disabled=true;
  $('insightBadge').textContent='CONCLUSION';
  $('insightText').textContent='Agent = while(true) { context.assemble() → llm.call() → response.parse() → tool.execute() → context.append(result) }. 이 루프가 전부다. Context Engineering이 곧 Agent Engineering.';
}
$('btnPlay').addEventListener('click',playAll);
$('btnStep').addEventListener('click',step);
$('btnReset').addEventListener('click',reset);
</script>
