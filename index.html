<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Anatomy</title>
<style>
:root{
  --bg:#08080d;--surface:#0f0f16;--surface2:#16161f;--surface3:#1e1e2a;
  --border:#252535;--text:#d8d8e8;--dim:#6e6e8e;--faint:#3e3e55;
  --accent:#818cf8;--accent-bg:rgba(129,140,248,.08);
  --green:#34d399;--green-bg:rgba(52,211,153,.08);
  --orange:#fbbf24;--orange-bg:rgba(251,191,36,.08);
  --pink:#f472b6;--pink-bg:rgba(244,114,182,.08);
  --cyan:#22d3ee;--cyan-bg:rgba(34,211,238,.08);
  --red:#f87171;--blue:#60a5fa;--blue-bg:rgba(96,165,250,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono','Fira Code','JetBrains Mono',monospace;background:var(--bg);color:var(--text);overflow-x:hidden}
.header{text-align:center;padding:2rem 1rem 1.2rem;border-bottom:1px solid var(--border)}
.header h1{font-size:1.8rem;font-weight:300}
.header h1 b{color:var(--accent);font-weight:700}
.header p{color:var(--dim);font-size:.85rem;margin-top:.3rem}
.controls{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;flex-wrap:wrap}
.btn{padding:7px 16px;border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:6px;cursor:pointer;font-family:inherit;font-size:.8rem;transition:all .2s}
.btn:hover{border-color:var(--accent)}.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn:disabled{opacity:.3;cursor:default}
.turn-info{color:var(--dim);font-size:.8rem}.turn-info b{color:var(--accent)}
.spacer{flex:1}
.speed-ctrl{display:flex;align-items:center;gap:6px;color:var(--faint);font-size:.75rem}
.speed-ctrl input{width:60px;accent-color:var(--accent)}
.lang-sel{display:flex;gap:2px}
.lang-btn{padding:3px 8px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);border-radius:4px;cursor:pointer;font-size:.65rem;font-family:inherit;transition:all .2s}
.lang-btn:hover{border-color:var(--accent)}.lang-btn.active{background:var(--accent-bg);color:var(--accent);border-color:var(--accent)}

.sequence{max-width:1100px;margin:0 auto;padding:0 20px 60px;position:relative}
.lane-headers{display:grid;grid-template-columns:1fr 1fr 1fr;position:sticky;top:45px;z-index:90;background:var(--bg);padding:16px 0 12px;border-bottom:1px solid var(--border)}
.lane-header{text-align:center}
.lane-node{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;border-radius:24px;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.lane-node.user-node{background:var(--green-bg);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.lane-node.agent-node{background:var(--orange-bg);color:var(--orange);border:1px solid rgba(251,191,36,.3)}
.lane-node.llm-node{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(129,140,248,.3)}
.lane-node .node-dot{width:8px;height:8px;border-radius:50%}
.user-node .node-dot{background:var(--green)}.agent-node .node-dot{background:var(--orange)}.llm-node .node-dot{background:var(--accent)}

.lane-lines{position:absolute;top:100px;left:0;right:0;bottom:0;display:grid;grid-template-columns:1fr 1fr 1fr;pointer-events:none;z-index:0}
.lifeline{border-left:1px dashed var(--border);margin-left:50%}
.steps{position:relative;z-index:1;padding-top:16px}

.step{opacity:0;transform:translateY(12px);transition:opacity .5s,transform .5s;margin-bottom:6px}
.step.visible{opacity:1;transform:translateY(0)}

.arrow-row{display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;min-height:36px;position:relative}
.arrow{position:relative;display:flex;align-items:center;padding:4px 0}
.arrow-line{flex:1;height:2px;background:var(--arrow-color)}
.arrow-head{width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;flex-shrink:0}
.arrow.right .arrow-head{border-left:10px solid var(--arrow-color)}
.arrow.left .arrow-head{border-right:10px solid var(--arrow-color)}
.arrow.left{flex-direction:row-reverse}
.arrow-label{position:absolute;top:-14px;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;color:var(--dim)}
.arrow.right .arrow-label{left:8px}.arrow.left .arrow-label{right:8px}
.span-1-2{grid-column:1/3;padding:0 25%}.span-2-3{grid-column:2/4;padding:0 25%}
.span-3-2{grid-column:2/4;padding:0 25%}.span-2-1{grid-column:1/3;padding:0 25%}

.msg-row{display:grid;grid-template-columns:1fr 1fr 1fr;margin-bottom:8px}
.msg-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:.72rem;line-height:1.6;max-width:100%;overflow:hidden}
.msg-card.at-user{grid-column:1}.msg-card.at-agent{grid-column:2}.msg-card.at-llm{grid-column:3}
.msg-card.span-agent-llm{grid-column:2/4}
.msg-card .card-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;margin-right:4px}
.t-green{background:var(--green-bg);color:var(--green)}.t-cyan{background:var(--cyan-bg);color:var(--cyan)}
.t-orange{background:var(--orange-bg);color:var(--orange)}.t-pink{background:var(--pink-bg);color:var(--pink)}
.t-accent{background:var(--accent-bg);color:var(--accent)}.t-blue{background:var(--blue-bg);color:var(--blue)}
.t-red{background:rgba(248,113,113,.1);color:var(--red)}
.msg-card .card-text{color:var(--text);white-space:pre-wrap;word-break:break-word}

.json{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:8px 10px;margin-top:6px;font-size:.65rem;line-height:1.7;white-space:pre-wrap;word-break:break-word;overflow:hidden;opacity:0;max-height:0;transition:opacity .4s .15s,max-height .4s .15s}
.json.show{opacity:1;max-height:2000px}
.jk{color:var(--cyan)}.js{color:var(--green)}.jb{color:var(--dim)}.jc{color:var(--faint);font-style:italic}

.turn-divider{text-align:center;padding:16px 0 10px;color:var(--faint);font-size:.65rem;letter-spacing:.1em}
.turn-divider span{padding:3px 14px;border:1px dashed var(--border);border-radius:12px}
.insight-bar{position:sticky;bottom:0;z-index:90;background:var(--surface);border-top:1px solid var(--border);padding:10px 20px;font-size:.78rem;display:flex;align-items:center;gap:10px}
.insight-bar .badge{background:var(--accent-bg);color:var(--accent);padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:700;white-space:nowrap}

@keyframes card-pop{0%{box-shadow:0 0 0 0 rgba(129,140,248,.3)}70%{box-shadow:0 0 0 8px rgba(129,140,248,0)}100%{box-shadow:0 0 0 0 rgba(129,140,248,0)}}
.msg-card.pop{animation:card-pop .6s ease-out}
@keyframes arrow-draw{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.arrow.right.animate .arrow-line{animation:arrow-draw .3s ease-out forwards;transform-origin:left center}
.arrow.left.animate .arrow-line{animation:arrow-draw .3s ease-out forwards;transform-origin:right center}
@media(max-width:800px){.lane-headers,.arrow-row,.msg-row,.lane-lines{display:block!important}.lane-header{display:inline-block;margin:0 4px}.span-1-2,.span-2-3,.span-3-2,.span-2-1{padding:0 20px}.msg-card{grid-column:auto!important;margin:4px 0}.lifeline{display:none}}
</style>
</head>
<body>
<div class="header">
  <h1>The <b>Anatomy</b> of an LLM Agent</h1>
  <p id="subtitle"></p>
</div>
<div class="controls">
  <button class="btn primary" id="btnPlay">&#9654; Play</button>
  <button class="btn" id="btnStep">Step</button>
  <button class="btn" id="btnReset">Reset</button>
  <span class="turn-info">Step <b id="stepNum">0</b> / <b id="stepTotal">0</b></span>
  <span class="spacer"></span>
  <div class="lang-sel" id="langSel"></div>
  <div class="speed-ctrl">
    <label>Speed</label>
    <input type="range" id="speedSlider" min="1" max="5" value="1">
  </div>
</div>
<div class="sequence">
  <div class="lane-headers">
    <div class="lane-header"><span class="lane-node user-node"><span class="node-dot"></span>User</span></div>
    <div class="lane-header"><span class="lane-node agent-node"><span class="node-dot"></span>Agent</span></div>
    <div class="lane-header"><span class="lane-node llm-node"><span class="node-dot"></span>LLM</span></div>
  </div>
  <div class="lane-lines"><div class="lifeline"></div><div class="lifeline"></div><div class="lifeline"></div></div>
  <div class="steps" id="steps"></div>
</div>
<div class="insight-bar">
  <span class="badge" id="insightBadge">INSIGHT</span>
  <span id="insightText"></span>
</div>

<script>
// ============================================================
// i18n
// ============================================================
const L = {
ko: {
  subtitle: 'User ↔ Agent ↔ LLM — request/response 사이클을 해부한다',
  startHint: 'Play를 눌러 시작하세요. User ↔ Agent ↔ LLM 사이 메시지가 어떻게 오가는지 볼 수 있습니다.',
  conclusion: 'Agent = while(true) { context.assemble() → llm.call() → response.parse() → tool.execute() → context.append(result) }. 이 루프가 전부다. Context Engineering이 곧 Agent Engineering.',
  turns: [
    { turn:1, label:'사용자가 요청을 입력한다' },
    { arrows:[{from:1,to:2,color:'var(--green)',label:'user message'}],
      cards:[{col:'at-user',tags:[{t:'t-green',l:'입력'}],text:'"할일 API 만들어줘"'}],
      insight:'사용자의 텍스트가 Agent에게 전달된다. 아직 LLM은 관여하지 않는다.' },
    { arrows:[{from:2,to:3,color:'var(--orange)',label:'API request'}],
      cards:[{col:'span-agent-llm',tags:[{t:'t-cyan',l:'system'},{t:'t-orange',l:'tools'},{t:'t-accent',l:'skills'},{t:'t-green',l:'user msg'}],
        text:'Agent가 모든 컨텍스트를 조립해서 LLM API에 전송:',
        json:`{
  "system": "You are Claude Code...\\n규칙, 제약, 페르소나\\n\\n## Available Skills\\n- /commit: Git commit workflow\\n- /test: Run test suite\\n- /review-pr: Review pull request\\n...",

  "tools": [
    { "name": "Bash", "description": "..." },
    { "name": "Read", ... },
    { "name": "Write", ... },
    { "name": "Edit", ... },
    { "name": "mcp__jira__search", ... }  // ← MCP 도구도 여기 섞임
  ],

  "messages": [
    { "role": "user", "content": "할일 API 만들어줘" }
  ]
}
// system: 페르소나 + 규칙 + 스킬 목록 (텍스트로 주입)
// skills는 별도 API 파라미터가 아니라 system 안의 텍스트
// tools: LLM이 호출할 수 있는 도구 정의
// messages: 대화 히스토리 (첫 턴이라 1개)`}],
      insight:'Agent의 핵심 역할: system + tools[] + messages[]를 조립해서 LLM API에 보내는 것. 스킬은 system 프롬프트 안에 텍스트로, MCP 도구는 tools[]에 섞여 들어간다. LLM은 이 구분을 모른다.' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'response (tool_use)'}],
      cards:[{col:'at-llm',tags:[{t:'t-accent',l:'LLM 판단'}],
        text:'LLM이 "프로젝트 구조부터 확인하자"고 결정:',
        json:`{
  "role": "assistant",
  "content": [
    { "type": "text",
      "text": "프로젝트 구조를 확인합니다." },
    { "type": "tool_use",
      "id": "toolu_01a",
      "name": "Bash",
      "input": { "command": "ls -la" } }
  ]
}
// tool_use = "이 도구를 이 인자로 실행해줘"
// LLM은 JSON을 출력할 뿐, 실행은 못 한다`}],
      insight:'LLM은 tools[]를 보고 "Bash를 쓸 수 있구나"를 안다. tool_use는 "실행 요청"이지 실행이 아니다. LLM은 JSON을 출력하는 것이 전부.' },
    { arrows:[],
      cards:[{col:'at-agent',tags:[{t:'t-orange',l:'실행'}],text:'Agent가 tool_use를 파싱하고 실제 실행:\n\n$ ls -la\npackage.json\nnode_modules/\nsrc/\n  app.js\n  routes/\ntests/'}],
      insight:'Agent의 두 번째 역할: LLM 응답에서 tool_use를 감지하면 실제로 실행하고, 결과를 수집한다.' },

    { turn:2, label:'Agent가 결과를 LLM에게 돌려보낸다' },
    { arrows:[{from:2,to:3,color:'var(--orange)',label:'tool_result 포함 재요청'}],
      cards:[{col:'span-agent-llm',tags:[{t:'t-orange',l:'tool_result'},{t:'t-red',l:'history 누적'}],
        text:'Agent가 실행 결과를 messages[]에 추가하고 다시 LLM 호출:',
        json:`"messages": [
  // 1. 원래 유저 메시지
  { "role": "user",
    "content": "할일 API 만들어줘" },

  // 2. 이전 LLM 응답 (그대로 보존)
  { "role": "assistant",
    "content": [..text, ..tool_use] },

  // 3. ★ 도구 실행 결과 (user role로!)
  { "role": "user",
    "content": [{
      "type": "tool_result",
      "tool_use_id": "toolu_01a",
      "content": "package.json\\nsrc/\\n  app.js..."
    }] }
]
// tool_result가 "user" role인 이유:
// LLM API에는 user/assistant만 있다.
// Agent가 결과를 "유저가 알려준 것"처럼 넣는다.`}],
      insight:'핵심 구조: tool_result는 "user" role로 들어간다! LLM API에 "도구 결과"라는 role은 없다. Agent가 실행 결과를 user 메시지로 끼워넣는 것. LLM은 매번 전체 messages[]를 처음부터 읽는다 (stateless).' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'response (tool_use)'}],
      cards:[{col:'at-llm',tags:[{t:'t-accent',l:'판단'}],
        text:'ls 결과를 보고 Express 라우터 생성을 결정:',
        json:`{
  "content": [
    { "type": "tool_use",
      "name": "Write",
      "input": {
        "file_path": "src/routes/todos.js",
        "content": "const router = require..."
      } }
  ]
}`}],
      insight:'LLM은 "src/routes/ 디렉토리가 있다"를 history에서 확인하고 거기에 파일을 만들기로 했다. 이전 턴의 결과가 다음 판단의 근거.' },
    { arrows:[],
      cards:[{col:'at-agent',tags:[{t:'t-orange',l:'실행'}],text:'Agent가 Write 도구 실행:\n→ src/routes/todos.js 파일 생성 완료'}],
      insight:null },

    { turn:3, label:'테스트 실행 → 실패 → 자가 수정' },
    { arrows:[{from:2,to:3,color:'var(--orange)',label:'result + 재요청'}],
      cards:[{col:'at-agent',tags:[{t:'t-orange',l:'context 조립'}],
        text:'messages[]가 점점 길어진다:\n\n[user] "할일 API 만들어줘"\n[assistant] tool_use: Bash(ls)\n[user] tool_result: 디렉토리 목록\n[assistant] tool_use: Write(todos.js)\n[user] tool_result: 파일 생성 완료\n← 매번 이 전부를 LLM에게 보낸다'}],
      insight:'LLM은 stateless — 매 호출마다 전체 대화를 처음부터 다시 읽는다. "기억"이란 없고, messages[]에 있는 것이 전부다. 대화가 길어지면 context window를 넘기므로 Agent가 오래된 메시지를 요약/삭제한다.' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'tool_use: Bash'}],
      cards:[{col:'at-llm',tags:[{t:'t-accent',l:'판단'}],
        text:'코드를 작성했으니 테스트 실행:',
        json:`{ "name": "Bash",
  "input": { "command": "npm test" } }
// system prompt: "코드 작성 후 반드시 테스트"
// 이 지침이 없으면 테스트 안 했을 수도!`}],
      insight:'System Prompt의 "테스트를 돌려라" 지침이 이 행동을 만들었다. 시스템 프롬프트 = LLM의 습관과 원칙.' },
    { arrows:[{from:2,to:3,color:'var(--red)',label:'test failure'}],
      cards:[{col:'at-agent',tags:[{t:'t-red',l:'실패 결과'}],
        text:'Agent가 테스트 결과를 tool_result로 전달:\n\n✓ GET /todos\n✓ POST /todos\n✗ GET /todos/:id → 404 처리 누락\n\n→ 이 에러 로그가 그대로 LLM에게 간다'}],
      insight:'"자가 수정"의 비밀: 에러 로그가 context에 있으니까 LLM이 원인을 추론할 수 있는 것. Agent가 결과를 넣어주지 않았다면 LLM은 실패 사실조차 모른다.' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'tool_use: Edit (수정)'}],
      cards:[{col:'at-llm',tags:[{t:'t-accent',l:'자가 수정'}],
        text:'실패 원인을 분석하고 수정:',
        json:`{ "name": "Edit", "input": {
  "file_path": "src/routes/todos.js",
  "old_string": "const todo = todos[id];",
  "new_string": "const todo = todos[id];\\nif (!todo) return res.status(404)..."
} }
// 에러 메시지 → 원인 추론 → 수정 코드 생성
// 전부 context 안의 정보로만 한 것`}],
      insight:'LLM이 버그를 고친 건 "똑똑해서"가 아니라 에러 로그 + 원본 코드가 context에 있었기 때문이다.' },

    { turn:4, label:'MCP — 외부 시스템 연동' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'tool_use: mcp__jira'}],
      cards:[{col:'at-llm',tags:[{t:'t-accent',l:'판단'}],
        text:'테스트 통과 후 Jira 업데이트를 결정:',
        json:`{ "name": "mcp__jira__transition_issue",
  "input": {
    "issue_key": "CLIP-123",
    "transition": "Done"
  } }
// LLM은 이게 MCP인지 모른다
// 그냥 tools[]에 있는 도구를 골랐을 뿐`}],
      insight:'LLM 입장에서 Bash든 mcp__jira든 동일한 "도구"다. MCP는 Agent가 외부 서버에서 도구를 가져오는 프로토콜일 뿐, LLM은 MCP의 존재를 모른다.' },
    { arrows:[],
      cards:[{col:'at-agent',tags:[{t:'t-pink',l:'MCP 라우팅'}],
        text:'Agent가 tool name을 파싱:\n\n"mcp__jira__" 접두사 감지\n→ Jira MCP 서버에 요청 전달\n→ MCP 서버가 실제 Jira REST API 호출\n→ 결과를 Agent에게 반환\n→ Agent가 tool_result로 변환해서 messages[]에 추가'}],
      insight:'MCP의 실체: Agent가 "mcp__" 접두사를 보고 해당 MCP 서버로 라우팅하는 것. Bash는 로컬 실행, mcp__jira는 MCP 서버로 전달. 이 라우팅은 Agent의 역할이지 LLM의 역할이 아니다.' },

    { turn:5, label:'Skill — 프롬프트 템플릿의 주입' },
    { arrows:[{from:1,to:2,color:'var(--green)',label:'/commit (skill)'}],
      cards:[{col:'at-user',tags:[{t:'t-green',l:'스킬 호출'}],text:'"/commit"'}],
      insight:null },
    { arrows:[{from:2,to:3,color:'var(--orange)',label:'skill → 프롬프트 주입'}],
      cards:[{col:'at-agent',tags:[{t:'t-accent',l:'스킬 확장'}],
        text:'Agent가 /commit을 감지하고 스킬 파일을 읽어서\nuser message에 프롬프트를 주입:',
        json:`{ "role": "user", "content":
  "/commit\\n\\n# Commit Skill\\n1. git status로 변경 파일 확인\\n2. git diff로 변경 내용 확인\\n3. 변경 분석 후 커밋 메시지 작성\\n4. git add 후 git commit\\n\\nCo-Authored-By: Claude..."
}
// 스킬 = 미리 작성된 프롬프트 템플릿
// LLM API에 "스킬" 파라미터는 없다
// user message 안에 텍스트로 주입될 뿐!`}],
      insight:'스킬의 정체: 미리 작성된 프롬프트 + 허용 도구 목록. "스킬"이라는 API 파라미터는 존재하지 않는다. Agent가 스킬 파일을 읽어서 user message에 텍스트로 넣는 것이 전부.' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'tool_use: git 명령'}],
      cards:[{col:'at-llm',tags:[{t:'t-accent',l:'지시 따름'}],
        text:'스킬 프롬프트의 순서대로 실행:\n→ Bash("git status")\n→ Bash("git diff")\n→ Bash("git commit -m ...")'}],
      insight:'LLM은 "스킬을 실행한다"는 의식이 없다. user message에 있는 지시를 따를 뿐. 잘 쓰인 프롬프트가 복잡한 워크플로우를 만든다.' },

    { turn:6, label:'루프 종료 — tool_use가 없는 응답' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'text only (no tool_use)'}],
      cards:[{col:'at-llm',tags:[{t:'t-blue',l:'완료'}],
        text:'더 이상 호출할 도구가 없다고 판단:',
        json:`{ "role": "assistant",
  "content": [{
    "type": "text",
    "text": "✅ 할일 API 생성 완료\\n- CRUD 라우터\\n- 입력 검증\\n- 테스트 통과\\n- Jira 업데이트"
  }],
  "stop_reason": "end_turn"
}
// tool_use가 없다 = 더 할 일이 없다
// Agent는 이걸 보고 루프를 멈춘다`}],
      insight:'루프 종료 조건: LLM 응답에 tool_use가 없으면 Agent는 루프를 멈추고 텍스트를 사용자에게 보여준다.' },
    { arrows:[{from:2,to:1,color:'var(--orange)',label:'최종 결과'}],
      cards:[{col:'at-user',tags:[{t:'t-green',l:'결과 표시'}],
        text:'사용자가 최종 결과를 본다:\n\n"✅ 할일 API 생성 완료\n- CRUD 라우터\n- 입력 검증\n- 테스트 통과\n- Jira 업데이트"'}],
      insight:'전체 루프: User→Agent→LLM→Agent(실행)→LLM→Agent(실행)→...→Agent→User. Agent는 "컨텍스트 조립 + 도구 실행 + 루프 관리"를 할 뿐. LLM은 "컨텍스트를 보고 다음 행동을 고르는" 것. Agent Engineering = Context Engineering.' },
  ]
},
en: {
  subtitle: 'User ↔ Agent ↔ LLM — Dissecting the request/response cycle',
  startHint: 'Press Play to start. See how messages flow between User ↔ Agent ↔ LLM.',
  conclusion: 'Agent = while(true) { context.assemble() → llm.call() → response.parse() → tool.execute() → context.append(result) }. That\'s all there is. Context Engineering IS Agent Engineering.',
  turns: [
    { turn:1, label:'User sends a request' },
    { arrows:[{from:1,to:2,color:'var(--green)',label:'user message'}],
      cards:[{col:'at-user',tags:[{t:'t-green',l:'input'}],text:'"Build a todo API"'}],
      insight:'The user\'s text reaches the Agent. The LLM is not involved yet.' },
    { arrows:[{from:2,to:3,color:'var(--orange)',label:'API request'}],
      cards:[{col:'span-agent-llm',tags:[{t:'t-cyan',l:'system'},{t:'t-orange',l:'tools'},{t:'t-accent',l:'skills'},{t:'t-green',l:'user msg'}],
        text:'Agent assembles all context and sends it to the LLM API:',
        json:`{
  "system": "You are Claude Code...\\nRules, constraints, persona\\n\\n## Available Skills\\n- /commit: Git commit workflow\\n- /test: Run test suite\\n...",

  "tools": [
    { "name": "Bash", "description": "..." },
    { "name": "Read", ... },
    { "name": "Write", ... },
    { "name": "Edit", ... },
    { "name": "mcp__jira__search", ... }  // ← MCP tools mixed in
  ],

  "messages": [
    { "role": "user", "content": "Build a todo API" }
  ]
}
// system: persona + rules + skill list (injected as text)
// skills are NOT a separate API parameter — just text in system
// tools: tool definitions the LLM can call
// messages: conversation history (just 1 on first turn)`}],
      insight:'The Agent\'s core job: assemble system + tools[] + messages[] and send to the LLM API. Skills are injected as text in system prompt. MCP tools are mixed into tools[]. The LLM doesn\'t know the difference.' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'response (tool_use)'}],
      cards:[{col:'at-llm',tags:[{t:'t-accent',l:'LLM decides'}],
        text:'LLM decides to check the project structure first:',
        json:`{
  "role": "assistant",
  "content": [
    { "type": "text",
      "text": "Let me check the project structure." },
    { "type": "tool_use",
      "id": "toolu_01a",
      "name": "Bash",
      "input": { "command": "ls -la" } }
  ]
}
// tool_use = "please run this tool with these args"
// The LLM only outputs JSON — it can't execute anything`}],
      insight:'The LLM sees tools[] and knows "I can use Bash." A tool_use is an execution request, not execution itself. The LLM only outputs JSON.' },
    { arrows:[],
      cards:[{col:'at-agent',tags:[{t:'t-orange',l:'execute'}],text:'Agent parses tool_use and actually executes:\n\n$ ls -la\npackage.json\nnode_modules/\nsrc/\n  app.js\n  routes/\ntests/'}],
      insight:'Agent\'s second role: detect tool_use in LLM response, execute it, collect results.' },

    { turn:2, label:'Agent returns result to LLM' },
    { arrows:[{from:2,to:3,color:'var(--orange)',label:'tool_result + re-request'}],
      cards:[{col:'span-agent-llm',tags:[{t:'t-orange',l:'tool_result'},{t:'t-red',l:'history grows'}],
        text:'Agent appends execution result to messages[] and calls LLM again:',
        json:`"messages": [
  // 1. Original user message
  { "role": "user",
    "content": "Build a todo API" },

  // 2. Previous LLM response (preserved)
  { "role": "assistant",
    "content": [..text, ..tool_use] },

  // 3. ★ Tool result (as user role!)
  { "role": "user",
    "content": [{
      "type": "tool_result",
      "tool_use_id": "toolu_01a",
      "content": "package.json\\nsrc/\\n  app.js..."
    }] }
]
// tool_result is "user" role because:
// The LLM API only has user/assistant roles.
// Agent injects the result as if "the user told me."`}],
      insight:'Key structure: tool_result goes in as "user" role! There is no "tool result" role in the LLM API. The Agent injects execution results as user messages. The LLM re-reads the entire messages[] from scratch every time (stateless).' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'response (tool_use)'}],
      cards:[{col:'at-llm',tags:[{t:'t-accent',l:'decides'}],
        text:'Sees ls result, decides to create Express router:',
        json:`{
  "content": [
    { "type": "tool_use",
      "name": "Write",
      "input": {
        "file_path": "src/routes/todos.js",
        "content": "const router = require..."
      } }
  ]
}`}],
      insight:'The LLM saw "src/routes/ exists" in history and decided to create a file there. Previous results inform the next decision.' },
    { arrows:[],
      cards:[{col:'at-agent',tags:[{t:'t-orange',l:'execute'}],text:'Agent executes Write tool:\n→ src/routes/todos.js created'}],
      insight:null },

    { turn:3, label:'Test → Failure → Self-correction' },
    { arrows:[{from:2,to:3,color:'var(--orange)',label:'result + re-request'}],
      cards:[{col:'at-agent',tags:[{t:'t-orange',l:'context assembly'}],
        text:'messages[] keeps growing:\n\n[user] "Build a todo API"\n[assistant] tool_use: Bash(ls)\n[user] tool_result: directory listing\n[assistant] tool_use: Write(todos.js)\n[user] tool_result: file created\n← All of this sent to LLM every time'}],
      insight:'The LLM is stateless — it reads the entire conversation from scratch every call. There is no "memory," only what\'s in messages[]. When it gets too long, the Agent summarizes/truncates old messages.' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'tool_use: Bash'}],
      cards:[{col:'at-llm',tags:[{t:'t-accent',l:'decides'}],
        text:'Code written, now run tests:',
        json:`{ "name": "Bash",
  "input": { "command": "npm test" } }
// system prompt: "always run tests after writing code"
// Without this instruction, it might not test at all!`}],
      insight:'The "run tests" instruction in System Prompt created this behavior. System Prompt = the LLM\'s habits and principles.' },
    { arrows:[{from:2,to:3,color:'var(--red)',label:'test failure'}],
      cards:[{col:'at-agent',tags:[{t:'t-red',l:'failure'}],
        text:'Agent sends test results as tool_result:\n\n✓ GET /todos\n✓ POST /todos\n✗ GET /todos/:id → missing 404\n\n→ This error log goes directly to the LLM'}],
      insight:'The secret of "self-correction": error logs are in the context, so the LLM can reason about the cause. Without the Agent feeding results back, the LLM wouldn\'t even know tests failed.' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'tool_use: Edit (fix)'}],
      cards:[{col:'at-llm',tags:[{t:'t-accent',l:'self-correction'}],
        text:'Analyzes failure and applies fix:',
        json:`{ "name": "Edit", "input": {
  "file_path": "src/routes/todos.js",
  "old_string": "const todo = todos[id];",
  "new_string": "const todo = todos[id];\\nif (!todo) return res.status(404)..."
} }
// error message → cause analysis → fix
// All from information in the context`}],
      insight:'The LLM fixed the bug not because it\'s "smart" — but because the error log + source code were both in context.' },

    { turn:4, label:'MCP — External system integration' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'tool_use: mcp__jira'}],
      cards:[{col:'at-llm',tags:[{t:'t-accent',l:'decides'}],
        text:'After tests pass, decides to update Jira:',
        json:`{ "name": "mcp__jira__transition_issue",
  "input": {
    "issue_key": "CLIP-123",
    "transition": "Done"
  } }
// The LLM doesn't know this is MCP
// It just picked a tool from tools[]`}],
      insight:'From the LLM\'s perspective, Bash and mcp__jira are the same kind of "tool." MCP is a protocol the Agent uses to fetch tool definitions from external servers. The LLM doesn\'t know MCP exists.' },
    { arrows:[],
      cards:[{col:'at-agent',tags:[{t:'t-pink',l:'MCP routing'}],
        text:'Agent parses the tool name:\n\n"mcp__jira__" prefix detected\n→ Forward request to Jira MCP server\n→ MCP server calls actual Jira REST API\n→ Returns result to Agent\n→ Agent converts to tool_result in messages[]'}],
      insight:'MCP in reality: Agent sees the "mcp__" prefix and routes to the corresponding MCP server. Bash runs locally, mcp__jira goes to the MCP server. This routing is the Agent\'s job, not the LLM\'s.' },

    { turn:5, label:'Skill — Prompt template injection' },
    { arrows:[{from:1,to:2,color:'var(--green)',label:'/commit (skill)'}],
      cards:[{col:'at-user',tags:[{t:'t-green',l:'skill call'}],text:'"/commit"'}],
      insight:null },
    { arrows:[{from:2,to:3,color:'var(--orange)',label:'skill → prompt injection'}],
      cards:[{col:'at-agent',tags:[{t:'t-accent',l:'skill expansion'}],
        text:'Agent detects /commit, reads the skill file,\nand injects the prompt into user message:',
        json:`{ "role": "user", "content":
  "/commit\\n\\n# Commit Skill\\n1. Check changes with git status\\n2. Review diff with git diff\\n3. Analyze and write commit message\\n4. git add and git commit\\n\\nCo-Authored-By: Claude..."
}
// Skill = pre-written prompt template
// There is NO "skill" parameter in the LLM API
// It's just text injected into the user message!`}],
      insight:'What a skill really is: a pre-written prompt + allowed tool list. There is no "skill" API parameter. The Agent reads a skill file and injects text into the user message. That\'s all.' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'tool_use: git commands'}],
      cards:[{col:'at-llm',tags:[{t:'t-accent',l:'follows instructions'}],
        text:'Executes in the order given by the skill prompt:\n→ Bash("git status")\n→ Bash("git diff")\n→ Bash("git commit -m ...")'}],
      insight:'The LLM has no concept of "running a skill." It simply follows instructions in the user message. Well-written prompts create complex workflows.' },

    { turn:6, label:'Loop ends — response without tool_use' },
    { arrows:[{from:3,to:2,color:'var(--accent)',label:'text only (no tool_use)'}],
      cards:[{col:'at-llm',tags:[{t:'t-blue',l:'done'}],
        text:'Decides there are no more tools to call:',
        json:`{ "role": "assistant",
  "content": [{
    "type": "text",
    "text": "✅ Todo API complete\\n- CRUD router\\n- Input validation\\n- Tests passing\\n- Jira updated"
  }],
  "stop_reason": "end_turn"
}
// No tool_use = nothing left to do
// Agent sees this and stops the loop`}],
      insight:'Loop termination: when LLM response has no tool_use, the Agent stops the loop and shows the text to the user.' },
    { arrows:[{from:2,to:1,color:'var(--orange)',label:'final result'}],
      cards:[{col:'at-user',tags:[{t:'t-green',l:'result'}],
        text:'User sees the final result:\n\n"✅ Todo API complete\n- CRUD router\n- Input validation\n- Tests passing\n- Jira updated"'}],
      insight:'Full loop: User→Agent→LLM→Agent(exec)→LLM→Agent(exec)→...→Agent→User. The Agent does "context assembly + tool execution + loop management." The LLM does "look at context, pick next action." Agent Engineering = Context Engineering.' },
  ]
},

let lang = 'ko', cur = 0, playing = false;
const $=id=>document.getElementById(id);
const stepsEl = $('steps');
const LANGS = [{code:'ko',name:'한국어'},{code:'en',name:'EN'},{code:'zh',name:'中文'},{code:'ja',name:'日本語'},{code:'es',name:'ES'}];

// Syntax highlight plain JSON text
function highlight(text) {
  return text
    .replace(/("(?:[^"\\]|\\.)*")(\s*:)/g, '<span class="jk">$1</span>$2')  // keys
    .replace(/:(\s*"(?:[^"\\]|\\.)*")/g, ': <span class="js">$1</span>')     // string values
    .replace(/"((?:[^"\\]|\\.)*)"/g, (m, p1, off, str) => {
      // already wrapped? skip
      if (str.substring(off-6, off).includes('class=')) return m;
      return `<span class="js">"${p1}"</span>`;
    })
    .replace(/([{}\[\]])/g, '<span class="jb">$1</span>')
    .replace(/(\/\/.*)/g, '<span class="jc">$1</span>')
    .replace(/(←[^\n]*)/g, '<span class="jc">$1</span>');
}

function initLang() {
  const sel = $('langSel');
  sel.innerHTML = '';
  LANGS.forEach(({code,name}) => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (code===lang?' active':'');
    btn.textContent = name;
    btn.onclick = () => { lang=code; reset(); initLang(); };
    sel.appendChild(btn);
  });
  $('subtitle').textContent = L[lang].subtitle;
  $('insightText').textContent = L[lang].startHint;
  $('stepTotal').textContent = L[lang].turns.filter(s=>!s.turn).length;
}
initLang();

function getDelay(){return [3500,2500,1800,1000,500][parseInt($('speedSlider').value)-1]}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

async function renderStep(idx, autoplay) {
  const s = L[lang].turns[idx];
  if (s.turn) {
    const d = document.createElement('div');
    d.className = 'turn-divider step';
    d.innerHTML = `<span>TURN ${s.turn} — ${s.label}</span>`;
    stepsEl.appendChild(d);
    requestAnimationFrame(()=>requestAnimationFrame(()=>d.classList.add('visible')));
    setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'center'}),50);
    return;
  }

  const stepEl = document.createElement('div');
  stepEl.className = 'step';
  let html = '';

  if (s.arrows?.length) {
    html += '<div class="arrow-row">';
    for (const a of s.arrows) {
      const spanCls = a.from<a.to?(a.from===1&&a.to===2?'span-1-2':'span-2-3'):(a.from===3&&a.to===2?'span-3-2':'span-2-1');
      const dir = a.from<a.to?'right':'left';
      html += `<div class="arrow ${dir} animate ${spanCls}" style="--arrow-color:${a.color}"><span class="arrow-label">${a.label}</span><div class="arrow-line"></div><div class="arrow-head"></div></div>`;
    }
    html += '</div>';
  }

  if (s.cards?.length) {
    html += '<div class="msg-row">';
    for (const c of s.cards) {
      const tags = (c.tags||[]).map(t=>`<span class="card-tag ${t.t}">${t.l}</span>`).join('');
      const jsonHtml = c.json ? `<div class="json" data-defer="1">${highlight(c.json)}</div>` : '';
      html += `<div class="msg-card pop ${c.col}">${tags}<div class="card-text">${c.text}</div>${jsonHtml}</div>`;
    }
    html += '</div>';
  }

  stepEl.innerHTML = html;
  stepsEl.appendChild(stepEl);
  requestAnimationFrame(()=>requestAnimationFrame(()=>stepEl.classList.add('visible')));

  // Deferred JSON reveal
  setTimeout(() => {
    stepEl.querySelectorAll('.json[data-defer]').forEach(j => j.classList.add('show'));
  }, 300);

  const dataSteps = L[lang].turns.slice(0,idx+1).filter(x=>!x.turn).length;
  $('stepNum').textContent = dataSteps;
  if (s.insight) $('insightText').textContent = s.insight;
  setTimeout(()=>stepEl.scrollIntoView({behavior:'smooth',block:'center'}),50);

  if (autoplay) await sleep(getDelay());
}

async function playAll() {
  if(playing){pause();return}
  playing=true;
  $('btnPlay').innerHTML='&#10074;&#10074; Pause';
  $('btnStep').disabled=true;
  while(playing && cur<L[lang].turns.length){
    await renderStep(cur, true); cur++;
  }
  if(cur>=L[lang].turns.length) onDone();
}
function pause(){playing=false;$('btnPlay').innerHTML='&#9654; Play';$('btnStep').disabled=false}
async function stepOnce(){
  if(cur>=L[lang].turns.length)return;
  $('btnStep').disabled=true;
  await renderStep(cur, false);
  cur++;
  $('btnStep').disabled=false;
  if(cur>=L[lang].turns.length) onDone();
}
function reset(){
  pause();cur=0;stepsEl.innerHTML='';
  $('stepNum').textContent=0;
  $('insightText').textContent=L[lang].startHint;
  $('insightBadge').textContent='INSIGHT';
  $('btnPlay').disabled=false;$('btnStep').disabled=false;
}
function onDone(){
  pause();$('btnPlay').disabled=true;
  $('insightBadge').textContent='CONCLUSION';
  $('insightText').textContent=L[lang].conclusion;
}
$('btnPlay').addEventListener('click',playAll);
$('btnStep').addEventListener('click',stepOnce);
$('btnReset').addEventListener('click',reset);
</script>
</body>
</html>
